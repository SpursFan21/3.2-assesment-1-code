version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing backend dependencies
      - cd backend
      - npm install

  pre_build:
    commands:
      - echo Running backend automated tests
      - npm test

  build:
    commands:
      - echo Build stage completed successfully

artifacts:
  files:
    - "**/*"